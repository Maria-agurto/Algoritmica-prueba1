<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acceso e inscripción a FISI Events — Facultad de Ingeniería de Sistemas e Informática, UNMSM" />
  <title>Acceso | FISI Events</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="pagina-login">
  <header class="login-header" role="banner">
    <a href="index.html" class="login-header__logo" aria-label="Ir al catálogo de eventos FISI">
      <span class="logo-acento" aria-hidden="true">■</span>
      <span class="logo-texto">FISI<strong>Events</strong></span>
    </a>
    <p class="login-header__facultad">Facultad de Ingeniería de Sistemas e Informática — UNMSM</p>
  </header>

  <main class="login-main" role="main">
    <div class="login-card" role="region" aria-label="Formulario de acceso">
      <div class="login-tabs" role="tablist" aria-label="Modo de acceso">
        <button class="login-tab login-tab--activo" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" type="button" data-tab="login">
          Iniciar Sesión
        </button>
        <button class="login-tab" id="tab-registro" role="tab" aria-selected="false" aria-controls="panel-registro" type="button" data-tab="registro">
          Registrarse
        </button>
      </div>

      <!-- PANEL 1: INICIO DE SESIÓN -->
      <div class="login-panel" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <form id="form-login" novalidate autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="login-username">Nombre de Usuario</label>
            <input class="form-input" type="text" id="login-username" name="username" placeholder="Ingresa tu usuario" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Contraseña</label>
            <div class="input-password-wrapper">
              <input class="form-input" type="password" id="login-password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="current-password" required />
              <button type="button" class="input-password-toggle" aria-label="Mostrar u ocultar contraseña" data-target="login-password">👁</button>
            </div>
            <span class="form-error" id="login-password-error" role="alert" aria-live="polite"></span>
          </div>
          <button class="btn-login-submit" type="submit" id="btn-login">
            <span class="btn-texto">Iniciar Sesión</span>
            <span class="spinner-loader spinner-loader--sm spinner-loader--blanco btn-spinner" hidden></span>
          </button>
          <p class="login-footer-text">
            ¿No tienes cuenta? <button type="button" class="link-tab-switch" data-goto="registro">Regístrate aquí</button>
          </p>
        </form>
      </div>

      <!-- PANEL 2: REGISTRO -->
      <div class="login-panel login-panel--oculto" id="panel-registro" role="tabpanel" aria-labelledby="tab-registro" hidden>
        <form id="form-registro" novalidate autocomplete="off">
          
          <fieldset class="form-fieldset">
            <legend class="form-legend">Datos de la cuenta</legend>
            <div class="form-group">
              <label class="form-label" for="reg-username">Nombre de Usuario <abbr title="Obligatorio">*</abbr></label>
              <input class="form-input" type="text" id="reg-username" name="username" placeholder="Crea un usuario único" required />
            </div>

            <div class="form-group">
              <label class="form-label" for="reg-password">Contraseña <abbr title="Obligatorio">*</abbr></label>
              <div class="input-password-wrapper">
                <input class="form-input" type="password" id="reg-password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
                <button type="button" class="input-password-toggle" aria-label="Mostrar u ocultar contraseña" data-target="reg-password">👁</button>
              </div>
            </div>

            <!-- Este bloque desaparecerá automáticamente si eligen "Grupo" -->
            <div id="bloque-nombres-personales">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="reg-nombres">Nombres <abbr title="Obligatorio">*</abbr></label>
                  <input class="form-input" type="text" id="reg-nombres" name="firstName" placeholder="Ej. Juan Pérez" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="reg-apellidos">Apellidos <abbr title="Obligatorio">*</abbr></label>
                  <input class="form-input" type="text" id="reg-apellidos" name="lastName" placeholder="Ej. Quispe Flores" />
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="form-fieldset">
            <legend class="form-legend">Tipo de cuenta</legend>
            <div class="rol-selector" role="group" aria-label="Seleccionar tipo de cuenta">
              <label class="rol-opcion">
                <input type="radio" name="role" value="alumno" id="rol-alumno" class="rol-radio" checked required />
                <span class="rol-opcion-card" aria-hidden="true">
                  <span class="rol-icono">🎓</span>
                  <span class="rol-nombre">Alumno</span>
                  <span class="rol-desc">Estudiante de la FISI</span>
                </span>
              </label>
              <label class="rol-opcion">
                <input type="radio" name="role" value="organizador" id="rol-organizador" class="rol-radio" required />
                <span class="rol-opcion-card" aria-hidden="true">
                  <span class="rol-icono">⚙️</span>
                  <span class="rol-nombre">Organizador</span>
                  <span class="rol-desc">Docente, círculo o lab.</span>
                </span>
              </label>
            </div>
          </fieldset>

          <fieldset class="form-fieldset bloque-alumno" id="bloque-alumno">
            <legend class="form-legend">Datos de estudiante UNMSM</legend>
            <div class="form-group">
              <label class="form-label" for="reg-codigo">Código de estudiante <abbr title="Obligatorio">*</abbr></label>
              <input class="form-input" type="text" id="reg-codigo" name="studentCode" placeholder="Ej. 21200010" maxlength="10" inputmode="numeric" autocomplete="off" />
              <small class="form-hint">Entre 8 y 10 dígitos numéricos.</small>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-facultad">Facultad <abbr title="Obligatorio">*</abbr></label>
              <select class="form-input form-select" id="reg-facultad" name="faculty">
                <option value="" disabled selected>Selecciona tu Facultad</option>
                <option value="Ingeniería de Sistemas e Informática">Ingeniería de Sistemas e Informática</option>
                <option value="Ingeniería de Software">Ingeniería de Software</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-carrera">Escuela / Carrera <abbr title="Obligatorio">*</abbr></label>
              <select class="form-input form-select" id="reg-carrera" name="career">
                <option value="" disabled selected>Selecciona tu Carrera</option>
                <option value="Ingeniería de Sistemas">Ingeniería de Sistemas</option>
                <option value="Ingeniería de Software">Ingeniería de Software</option>
              </select>
            </div>
          </fieldset>

          <fieldset class="form-fieldset bloque-organizador hidden" id="bloque-organizador" hidden>
            <legend class="form-legend">Tipo de organizador</legend>
            <div class="rol-selector rol-selector--organizador" role="group" aria-label="Subtipo de organizador">
              <label class="rol-opcion">
                <input type="radio" name="organizerType" value="persona" id="org-persona" class="rol-radio" checked />
                <span class="rol-opcion-card" aria-hidden="true">
                  <span class="rol-icono">👤</span>
                  <span class="rol-nombre">Persona</span>
                  <span class="rol-desc">Docente o administrativo</span>
                </span>
              </label>
              <label class="rol-opcion">
                <input type="radio" name="organizerType" value="grupo" id="org-grupo" class="rol-radio" />
                <span class="rol-opcion-card" aria-hidden="true">
                  <span class="rol-icono">👥</span>
                  <span class="rol-nombre">Grupo</span>
                  <span class="rol-desc">Círculo / laboratorio</span>
                </span>
              </label>
            </div>
            <div class="form-group bloque-nombre-grupo hidden" id="bloque-nombre-grupo" hidden>
              <label class="form-label" for="reg-nombre-grupo">
                Nombre del Círculo / Laboratorio <abbr title="Obligatorio">*</abbr>
              </label>
              <input class="form-input" type="text" id="reg-nombre-grupo" name="groupName" placeholder="Ej. Lab de IA" autocomplete="organization" />
            </div>
          </fieldset>

          <button class="btn-login-submit" type="submit" id="btn-registro">
            <span class="btn-texto">Crear cuenta</span>
            <span class="spinner-loader spinner-loader--sm spinner-loader--blanco btn-spinner" hidden></span>
          </button>
          <p class="login-footer-text">
            ¿Ya tienes cuenta? <button type="button" class="link-tab-switch" data-goto="login">Inicia sesión</button>
          </p>
        </form>
      </div>
    </div>
  </main>

  <footer class="login-footer" role="contentinfo">
    <p>© <span id="ano-actual"></span> FISI Events — UNMSM. Todos los derechos reservados.</p>
  </footer>

  <!-- SCRIPT DEFINITIVO Y ORDENADO -->
  <script type="module">
    import { registrar, iniciarSesion, redirigirPorRol } from './js/modules/auth.js';

    document.getElementById('ano-actual').textContent = new Date().getFullYear();

    const tabs           = document.querySelectorAll('.login-tab');
    const panelLogin     = document.getElementById('panel-login');
    const panelRegistro  = document.getElementById('panel-registro');
    const formLogin      = document.getElementById('form-login');
    const formRegistro   = document.getElementById('form-registro');
    const radioRoles     = document.querySelectorAll('input[name="role"]');
    const radioOrgTypes  = document.querySelectorAll('input[name="organizerType"]');
    
    // Bloques visuales
    const bloqueAlumno   = document.getElementById('bloque-alumno');
    const bloqueOrg      = document.getElementById('bloque-organizador');
    const bloqueGrupo    = document.getElementById('bloque-nombre-grupo');
    const bloqueNombres  = document.getElementById('bloque-nombres-personales');

    function activarTab(nombreTab) {
      const esLogin = nombreTab === 'login';
      tabs.forEach((tab) => {
        const activo = tab.dataset.tab === nombreTab;
        tab.classList.toggle('login-tab--activo', activo);
        tab.setAttribute('aria-selected', String(activo));
      });
      panelLogin.hidden = !esLogin;
      panelRegistro.hidden = esLogin;
      panelLogin.classList.toggle('login-panel--oculto', !esLogin);
      panelRegistro.classList.toggle('login-panel--oculto', esLogin);
    }

    tabs.forEach((tab) => tab.addEventListener('click', () => activarTab(tab.dataset.tab)));
    document.querySelectorAll('.link-tab-switch').forEach((btn) => btn.addEventListener('click', () => activarTab(btn.dataset.goto)));

    function actualizarFormularioPorTipo() {
        const rol = document.querySelector('input[name="role"]:checked')?.value;
        const tipo = document.querySelector('input[name="organizerType"]:checked')?.value;
        
        const esAlumno = (rol === 'alumno');
        const esGrupo = (rol === 'organizador' && tipo === 'grupo');

        _toggleBloque(bloqueAlumno, esAlumno);
        _toggleBloque(bloqueOrg, !esAlumno);
        bloqueAlumno.querySelectorAll('input, select').forEach(el => el.disabled = !esAlumno);
        bloqueOrg.querySelectorAll('input, select').forEach(el => el.disabled = esAlumno);

        _toggleBloque(bloqueNombres, !esGrupo);
        bloqueNombres.querySelectorAll('input').forEach(el => el.disabled = esGrupo);

        _toggleBloque(bloqueGrupo, esGrupo);
        bloqueGrupo.querySelectorAll('input').forEach(el => el.disabled = !esGrupo);
    }

    radioRoles.forEach((r) => r.addEventListener('change', actualizarFormularioPorTipo));
    radioOrgTypes.forEach((r) => r.addEventListener('change', actualizarFormularioPorTipo));
    actualizarFormularioPorTipo();

    document.querySelectorAll('.input-password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const esPass = input.type === 'password';
        input.type = esPass ? 'text' : 'password';
        btn.textContent = esPass ? '🙈' : '👁';
      });
    });

    // ── ENVÍO DE LOGIN ──
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const username = document.getElementById('login-username').value.trim();
      const pass = document.getElementById('login-password').value;

      _activarCarga(btn, true);
      const resultado = await iniciarSesion(username, pass);
      _activarCarga(btn, false);

      if (resultado.exito) redirigirPorRol(resultado.role);
    });

    // ── ENVÍO DE REGISTRO ──
    formRegistro.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-registro');
      
      const rol = document.querySelector('input[name="role"]:checked')?.value;
      const orgType = document.querySelector('input[name="organizerType"]:checked')?.value;
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;

      const formData = {
          username: username,
          role: rol,
          firstName: document.getElementById('reg-nombres').value.trim(),
          lastName: document.getElementById('reg-apellidos').value.trim(),
          studentCode: document.getElementById('reg-codigo').value.trim(),
          faculty: document.getElementById('reg-facultad').value,
          career: document.getElementById('reg-carrera').value,
          organizerType: orgType,
          groupName: document.getElementById('reg-nombre-grupo').value.trim(),
      };

      _activarCarga(btn, true);
      const resultado = await registrar(username, password, formData);
      _activarCarga(btn, false);

      if (resultado.exito) redirigirPorRol(formData.role);
    });

    function _toggleBloque(el, visible) {
      if (!el) return;
      if (visible) {
        el.hidden = false;
        el.classList.remove('hidden');
        requestAnimationFrame(() => el.classList.add('bloque-visible'));
      } else {
        el.classList.remove('bloque-visible');
        el.classList.add('hidden');
        const onEnd = () => { el.hidden = true; el.removeEventListener('transitionend', onEnd); };
        el.addEventListener('transitionend', onEnd);
      }
    }

    function _activarCarga(btn, cargando) {
      btn.disabled = cargando;
      const texto = btn.querySelector('.btn-texto');
      const spinner = btn.querySelector('.btn-spinner');
      if (texto) texto.hidden = cargando;
      if (spinner) spinner.hidden = !cargando;
    }
  </script>
</body>
</html>
